<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="containeur">
        <nav class="navbar">

            
            <a href="index.html" class="home-button">Convertisseur</a>
        </nav>

    </div>


    <div class="explications">
        <h1>Convertisseur</h1>
    </div>

    <div class="zone_convertisseur">
        <h3>Zone de conversion</h3>
        <p>Choisissez le type d'unité, l'unité de départ et l'unité d'arrivée puis entrez une valeur. <br> Cliquez sur "Convertir" pour obtenir le résultat.</p>

        <div class="converter-grid">
            <section class="card input-card">
                <h4>Entrée</h4>
                <label for="unit_type">Type d'unité</label>
                <select id="unit_type">
                    <option value="distance">Longueur</option>
                    <option value="masse">Masse</option>
                    <option value="temperature">Température</option>
                    <option value="vitesse">Vitesse</option>
                </select>

                <label for="from_unit">Unité de départ</label>
                <select id="from_unit">
                </select>

                <label for="input_value">Valeur</label>
                <input type="number" name="input_value" id="input_value" placeholder="Valeur à convertir">

                <button id="convert_button">Convertir</button>
            </section>

            <section class="card output-card">
                <h4>Sortie</h4>
                <label for="to_unit">Unité d'arrivée</label>
                <select id="to_unit">
                </select>

                <div id="result" class="result">-</div>
            </section>
        </div>

    </div>
    <script src="script.js"t ></script>
</body>
</html>
